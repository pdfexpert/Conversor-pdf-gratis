<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PDF PRO - TEST</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { 
            background: url('https://images.unsplash.com/photo-1497032628192-86f99bcd76bc?q=80&w=1600') no-repeat center center fixed; 
            background-size: cover;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif;
        }
        .caja {
            background: rgba(255,255,255,0.9); /* Blanco casi sólido para que se vea bien */
            padding: 40px; border-radius: 20px; text-align: center; color: black;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        input, button { display: block; width: 100%; margin: 20px 0; padding: 10px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="caja">
        <h1 style="margin:0">PDF PRO</h1>
        <p>Selecciona tu imagen abajo:</p>
        
        <input type="file" id="archivo" accept="image/*">
        <button onclick="descargar()">DESCARGAR PDF</button>
    </div>

    <script>
        function descargar() {
            const input = document.getElementById('archivo');
            if (input.files.length === 0) { alert("Elige una imagen"); return; }
            
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const reader = new FileReader();
            
            reader.onload = function(e) {
                doc.addImage(e.target.result, 'JPEG', 10, 10, 180, 150);
                doc.save("archivo.pdf");
            }
            reader.readAsDataURL(input.files[0]);
        }
    </script>
</body>
</html>
