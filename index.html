<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF PRO | Convertidor Gratis</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/337/337946.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: #0f172a; /* Color oscuro sólido para que se vea siempre */
            color: white; padding: 40px 20px; display: flex; flex-direction: column; align-items: center;
        }
        .main-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            width: 100%; max-width: 500px; text-align: center;
        }
        .brand { font-size: 35px; font-weight: 800; margin-bottom: 20px; color: #818cf8; }
        .upload-area {
            border: 2px dashed #4f46e5; border-radius: 15px; padding: 30px;
            cursor: pointer; display: block; margin-bottom: 20px; background: rgba(0,0,0,0.2);
        }
        #preview { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 5px; }
        .btn-main {
            background: #4f46e5; color: white; border: none; padding: 15px;
            width: 100%; border-radius: 10px; font-weight: 700; cursor: pointer; display: none;
        }
        input[type="file"] { display: none; }
        .faq { margin-top: 40px; max-width: 500px; font-size: 14px; color: #94a3b8; text-align: left; }
    </style>
</head>
<body>
    <div class="main-card">
        <div class="brand">PDF PRO</div>
        <label for="fileInput" class="upload-area">
            <span>📂 Selecciona tus fotos</span>
            <input type="file" id="fileInput" accept="image/*" multiple>
        </label>
        <div id="preview"></div>
        <button id="btnAction" class="btn-main" onclick="generatePDF()">DESCARGAR PDF (<span id="count">0</span>)</button>
    </div>
    <div class="faq">
        <h3>Preguntas Frecuentes</h3>
        <p><strong>¿Cómo funciona?</strong> Selecciona varias imágenes y pulsa descargar. El PDF se creará automáticamente.</p>
    </div>
    <script>
        const input = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const btn = document.getElementById('btnAction');
        const countSpan = document.getElementById('count');
        let archivos = [];

        input.addEventListener('change', function(e) {
            archivos = Array.from(e.target.files);
            if (archivos.length > 0) {
                preview.innerHTML = '';
                countSpan.innerText = archivos.length;
                btn.style.display = 'block';
                archivos.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const img = document.createElement('img');
                        img.src = ev.target.result; img.className = 'thumb';
                        preview.appendChild(img);
                    }
                    reader.readAsDataURL(file);
                });
            }
        });

        async function generatePDF() {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();
            for (let i = 0; i < archivos.length; i++) {
                const imgData = await new Promise(resolve => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.readAsDataURL(archivos[i]);
                });
                if (i > 0) pdf.addPage();
                pdf.addImage(imgData, 'JPEG', 10, 10, 190, 0);
            }
            pdf.save("archivo.pdf");
        }
    </script>
</body>
</html>
