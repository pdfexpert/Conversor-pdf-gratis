<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF PRO | Convertidor de Imágenes Gratis</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/337/337946.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            /* FONDO NUEVO: Imagen profesional con degradado oscuro para que resalte el texto */
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.9)), 
                        url('https://images.unsplash.com/photo-1497032628192-86f99bcd76bc?q=80&w=1600&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white; 
            margin: 0;
            padding: 40px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
        }
        .main-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); /* Efecto cristal */
            -webkit-backdrop-filter: blur(10px);
            padding: 40px; 
            border-radius: 24px; 
            border: 1px solid rgba(255,255,255,0.2);
            width: 100%; 
            max-width: 500px; 
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .brand { 
            font-size: 40px; 
            font-weight: 800; 
            margin-bottom: 10px; 
            color: #818cf8;
            letter-spacing: -1px;
        }
        .tagline {
            font-size: 14px;
            color: #cbd5e1;
            margin-bottom: 30px;
        }
        .upload-area {
            border: 2px dashed #6366f1; 
            border-radius: 15px; 
            padding: 40px 20px;
            cursor: pointer; 
            display: block; 
            margin-bottom: 20px; 
            background: rgba(0,0,0,0.3);
            transition: 0.3s;
        }
        .upload-area:hover {
            border-color: #818cf8;
            background: rgba(99, 102, 241, 0.1);
        }
        #preview { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); 
            gap: 10px; 
            justify-content: center; 
            margin-bottom: 20px; 
        }
        .thumb { 
            width: 70px; 
            height: 70px; 
            object-fit: cover; 
            border-radius: 8px; 
            border: 2px solid #6366f1;
        }
        .btn-main {
            background: #6366f1; 
            color: white; 
            border: none; 
            padding: 18px;
            width: 100%; 
            border-radius: 12px; 
            font-weight: 700; 
            font-size: 16px;
            cursor: pointer; 
            display: none;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }
        .btn-main:hover {
            background: #4f46e5;
            transform: translateY(-2px);
        }
        input[type="file"] { display: none; }
        .faq { 
            margin-top: 50px; 
            max-width: 500px; 
            font-size: 14px; 
            color: #94a3b8; 
            text-align: left;
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 15px;
        }
    </style>
</head>

        <div class="tagline">Herramienta rápida y segura</div>
